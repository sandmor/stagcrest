name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build core mod
        run: bash scripts/build-core-mod.sh
      - name: Build native
        run: cargo build -p stagcrest-app --release

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build core mod
        run: bash scripts/build-core-mod.sh
      - name: Install Trunk
        run: cargo install trunk --locked
      - name: Build web
        run: trunk build
